name: Build Flutter APK Signed

on:
  workflow_dispatch:

  push:
    branches:
      - main
permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find and unzip Flutter project
        shell: bash
        run: |
          set -e
          ZIP_FILE="$(find . -maxdepth 1 -type f -iname '*.zip' | sort | tail -n 1)"
          if [ -z "$ZIP_FILE" ]; then
            echo "No ZIP file found in repository root."
            exit 1
          fi
          echo "Found ZIP file: $ZIP_FILE"
          rm -rf extracted_project
          mkdir extracted_project
          unzip -q "$ZIP_FILE" -d extracted_project
          PUBSPEC_FILE="$(find extracted_project -type f -name pubspec.yaml | head -n 1)"
          if [ -z "$PUBSPEC_FILE" ]; then
            echo "pubspec.yaml not found."
            find extracted_project -maxdepth 4 -type f
            exit 1
          fi
          PROJECT_DIR="$(dirname "$PUBSPEC_FILE")"
          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"
          echo "Flutter project directory: $PROJECT_DIR"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Prepare Flutter project
        shell: bash
        run: |
          set -e
          cd "$PROJECT_DIR"
          flutter --version
          flutter config --no-analytics
          if [ ! -d "android" ]; then
            flutter create . --platforms=android --org com.kadkhodae
          fi
          flutter pub get

      - name: Patch Android manifest and signing
        shell: bash
        run: |
          set -e
          cd "$PROJECT_DIR"

          cat > /tmp/upload-keystore.b64 <<'KEYSTORE_B64'

KEYSTORE_B64
          base64 --decode /tmp/upload-keystore.b64 > android/app/upload-keystore.jks

          python3 - <<'PY'
          from pathlib import Path

          manifest = Path("android/app/src/main/AndroidManifest.xml")
          text = manifest.read_text()
          if "android.permission.INTERNET" not in text:
              i = text.find(">")
              text = text[:i+1] + '\n    <uses-permission android:name="android.permission.INTERNET"/>' + text[i+1:]
          queries = '''
    <queries>
        <intent>
            <action android:name="android.intent.action.VIEW" />
            <data android:scheme="sms" />
        </intent>
        <intent>
            <action android:name="android.intent.action.VIEW" />
            <data android:scheme="smsto" />
        </intent>
        <intent>
            <action android:name="android.intent.action.SENDTO" />
            <data android:scheme="sms" />
        </intent>
        <intent>
            <action android:name="android.intent.action.SENDTO" />
            <data android:scheme="smsto" />
        </intent>
    </queries>
'''
          if "android.intent.action.SENDTO" not in text and "<application" in text:
              text = text.replace("<application", queries + "\n    <application", 1)
          if "usesCleartextTraffic" not in text:
              text = text.replace("<application", '<application android:usesCleartextTraffic="true"', 1)
          manifest.write_text(text)

          groovy = Path("android/app/build.gradle")
          kotlin = Path("android/app/build.gradle.kts")

          if groovy.exists():
              g = groovy.read_text()
              if "postman_upload" not in g:
                  sign = '''
    signingConfigs {
        release {
            keyAlias 'postman_upload'
            keyPassword 'PostManFixedKey2026!'
            storeFile file('upload-keystore.jks')
            storePassword 'PostManFixedKey2026!'
        }
    }
'''
                  g = g.replace("    buildTypes {", sign + "\n    buildTypes {", 1)
              g = g.replace("signingConfig signingConfigs.debug", "signingConfig signingConfigs.release")
              g = g.replace("signingConfig = signingConfigs.debug", "signingConfig = signingConfigs.release")
              groovy.write_text(g)

          if kotlin.exists():
              k = kotlin.read_text()
              if "postman_upload" not in k:
                  sign = '''
    signingConfigs {
        create("release") {
            keyAlias = "postman_upload"
            keyPassword = "PostManFixedKey2026!"
            storeFile = file("upload-keystore.jks")
            storePassword = "PostManFixedKey2026!"
        }
    }
'''
                  k = k.replace("    buildTypes {", sign + "\n    buildTypes {", 1)
              k = k.replace('signingConfig = signingConfigs.getByName("debug")', 'signingConfig = signingConfigs.getByName("release")')
              k = k.replace('signingConfig = signingConfigs.getByName("release")', 'signingConfig = signingConfigs.getByName("release")')
              kotlin.write_text(k)
          PY

      - name: Build signed release APK
        shell: bash
        run: |
          set -e
          cd "$PROJECT_DIR"
          flutter build apk --release
          VERSION_LINE="$(grep '^version:' pubspec.yaml | head -n 1 | awk '{print $2}')"
          VERSION_CODE="${VERSION_LINE##*+}"
          if [ -z "$VERSION_CODE" ] || [ "$VERSION_CODE" = "$VERSION_LINE" ]; then VERSION_CODE="release"; fi
          cp build/app/outputs/flutter-apk/app-release.apk "build/app/outputs/flutter-apk/app-release-v${VERSION_CODE}.apk"
          echo "APK_NAME=app-release-v${VERSION_CODE}.apk" >> "$GITHUB_ENV"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: post-management-signed-apk
          path: ${{ env.PROJECT_DIR }}/build/app/outputs/flutter-apk/app-release-v*.apk
          if-no-files-found: error
. 
