name: Build Flutter APK from ZIP

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "*.zip"
      - ".github/workflows/build-apk.yml"

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find and unzip Flutter project
        shell: bash
        run: |
          set -e

          ZIP_FILE="$(find . -maxdepth 1 -type f -iname '*.zip' | head -n 1)"

          if [ -z "$ZIP_FILE" ]; then
            echo "No ZIP file found in repository root."
            exit 1
          fi

          echo "Found ZIP file: $ZIP_FILE"

          rm -rf extracted_project
          mkdir extracted_project

          unzip -q "$ZIP_FILE" -d extracted_project

          PUBSPEC_FILE="$(find extracted_project -type f -name pubspec.yaml | head -n 1)"

          if [ -z "$PUBSPEC_FILE" ]; then
            echo "pubspec.yaml not found. This ZIP is not a valid Flutter project."
            find extracted_project -maxdepth 4 -type f
            exit 1
          fi

          PROJECT_DIR="$(dirname "$PUBSPEC_FILE")"

          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"
          echo "Flutter project directory: $PROJECT_DIR"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Prepare Flutter project
        shell: bash
        run: |
          set -e

          cd "$PROJECT_DIR"

          flutter --version
          flutter config --no-analytics

          # اگر پوشه android داخل پروژه نبود، خودش می‌سازد
          if [ ! -d "android" ]; then
            flutter create . --platforms=android --org com.kadkhodae
          fi

          flutter pub get

      - name: Patch Android internet permission
        shell: bash
        run: |
          set -e

          cd "$PROJECT_DIR"

          MANIFEST="android/app/src/main/AndroidManifest.xml"

          python3 - <<'PY'
          from pathlib import Path

          manifest = Path("android/app/src/main/AndroidManifest.xml")
          text = manifest.read_text()

          if "android.permission.INTERNET" not in text:
              first_close = text.find(">")
              text = text[:first_close + 1] + '\n    <uses-permission android:name="android.permission.INTERNET"/>' + text[first_close + 1:]

          if "usesCleartextTraffic" not in text:
              text = text.replace("<application", '<application android:usesCleartextTraffic="true"', 1)

          manifest.write_text(text)
          PY

      - name: Build release APK
        shell: bash
        run: |
          set -e

          cd "$PROJECT_DIR"

          flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: post-management-release-apk
          path: ${{ env.PROJECT_DIR }}/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
