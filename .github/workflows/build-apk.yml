name: Build Flutter APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find Flutter ZIP and extract
        shell: bash
        run: |
          set -e

          rm -rf extracted clean_app
          mkdir extracted

          FOUND_ZIP=""

          for ZIP in *.zip; do
            if [ -f "$ZIP" ]; then
              echo "Checking ZIP: $ZIP"
              if unzip -l "$ZIP" | grep -q "pubspec.yaml"; then
                FOUND_ZIP="$ZIP"
                break
              fi
            fi
          done

          if [ -z "$FOUND_ZIP" ]; then
            echo "No Flutter ZIP with pubspec.yaml found."
            exit 1
          fi

          echo "Selected ZIP: $FOUND_ZIP"
          unzip -q "$FOUND_ZIP" -d extracted

          PUBSPEC_FILE="$(find extracted -type f -name pubspec.yaml | head -n 1)"

          if [ -z "$PUBSPEC_FILE" ]; then
            echo "pubspec.yaml not found after extract."
            exit 1
          fi

          SRC_DIR="$(dirname "$PUBSPEC_FILE")"

          APP_NAME="$(grep '^name:' "$PUBSPEC_FILE" | head -n 1 | awk '{print $2}' | tr -cd 'a-zA-Z0-9_')"
          if [ -z "$APP_NAME" ]; then
            APP_NAME="post_management_sms"
          fi

          echo "SRC_DIR=$SRC_DIR" >> "$GITHUB_ENV"
          echo "APP_NAME=$APP_NAME" >> "$GITHUB_ENV"

          echo "Source project: $SRC_DIR"
          echo "App name: $APP_NAME"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Create clean Flutter Android project
        shell: bash
        run: |
          set -e

          flutter --version
          flutter config --no-analytics

          flutter create clean_app --platforms=android --org com.kadkhodae --project-name "$APP_NAME"

          rm -rf clean_app/lib
          cp -R "$SRC_DIR/lib" clean_app/lib

          cp "$SRC_DIR/pubspec.yaml" clean_app/pubspec.yaml

          if [ -f "$SRC_DIR/analysis_options.yaml" ]; then
            cp "$SRC_DIR/analysis_options.yaml" clean_app/analysis_options.yaml
          fi

          if [ -d "$SRC_DIR/assets" ]; then
            cp -R "$SRC_DIR/assets" clean_app/assets
          fi

          if [ -d "$SRC_DIR/icons" ]; then
            cp -R "$SRC_DIR/icons" clean_app/icons
          fi

          if [ -f "$SRC_DIR/README_FA.txt" ]; then
            cp "$SRC_DIR/README_FA.txt" clean_app/README_FA.txt
          fi

          echo "PROJECT_DIR=clean_app" >> "$GITHUB_ENV"

      - name: Patch Android permissions
        shell: bash
        run: |
          set -e

          cd "$PROJECT_DIR"

          MANIFEST="android/app/src/main/AndroidManifest.xml"

          python3 - <<'PY'
          from pathlib import Path

          manifest = Path("android/app/src/main/AndroidManifest.xml")
          text = manifest.read_text()

          if 'android.permission.INTERNET' not in text:
              text = text.replace(
                  '<manifest xmlns:android="http://schemas.android.com/apk/res/android">',
                  '<manifest xmlns:android="http://schemas.android.com/apk/res/android">\n    <uses-permission android:name="android.permission.INTERNET" />'
              )

          if 'android.permission.ACCESS_NETWORK_STATE' not in text:
              text = text.replace(
                  '<uses-permission android:name="android.permission.INTERNET" />',
                  '<uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />'
              )

          if 'usesCleartextTraffic' not in text:
              text = text.replace(
                  '<application',
                  '<application android:usesCleartextTraffic="true"',
                  1
              )

          queries = '''
    <queries>
        <intent>
            <action android:name="android.intent.action.VIEW" />
            <data android:scheme="sms" />
        </intent>
        <intent>
            <action android:name="android.intent.action.VIEW" />
            <data android:scheme="smsto" />
        </intent>
        <intent>
            <action android:name="android.intent.action.SENDTO" />
            <data android:scheme="sms" />
        </intent>
        <intent>
            <action android:name="android.intent.action.SENDTO" />
            <data android:scheme="smsto" />
        </intent>
    </queries>
'''

          if '<queries>' not in text:
              text = text.replace('<application', queries + '\n    <application', 1)

          manifest.write_text(text)
          PY

          echo "AndroidManifest patched:"
          cat "$MANIFEST"

      - name: Flutter Pub Get
        shell: bash
        run: |
          set -e
          cd "$PROJECT_DIR"
          flutter pub get

      - name: Build release APK
        shell: bash
        run: |
          set -e
          cd "$PROJECT_DIR"
          flutter build apk --release

      - name: Rename APK
        shell: bash
        run: |
          set -e
          cd "$PROJECT_DIR"

          VERSION_LINE="$(grep '^version:' pubspec.yaml | head -n 1 | awk '{print $2}')"
          VERSION_CODE="${VERSION_LINE##*+}"

          if [ -z "$VERSION_CODE" ] || [ "$VERSION_CODE" = "$VERSION_LINE" ]; then
            VERSION_CODE="release"
          fi

          cp build/app/outputs/flutter-apk/app-release.apk "build/app/outputs/flutter-apk/post-management-v${VERSION_CODE}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: post-management-apk
          path: ${{ env.PROJECT_DIR }}/build/app/outputs/flutter-apk/post-management-v*.apk
          if-no-files-found: error
